# Auto-announce a new blog post to socials when it's merged to main.
#
# Setup:
#   1. Add SOCIALPOSTFLOW_API_TOKEN to your repo secrets.
#   2. Add SOCIALPOSTFLOW_PROFILE_IDS (e.g. "42,87,103") to your repo secrets.
#   3. Commit this file as .github/workflows/announce-blog-post.yml
#   4. The action runs whenever a file under content/blog/ is added on main.
#
# The example assumes Hugo / Jekyll-style frontmatter with `title:` and `url:`.

name: Announce blog post

on:
    push:
        branches: [main]
        paths:
            - 'content/blog/**'

jobs:
    announce:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 2

            - name: Determine the new post
              id: post
              run: |
                  NEW_FILE=$(git diff --name-only HEAD^ HEAD -- 'content/blog/**' | head -1)
                  if [ -z "$NEW_FILE" ]; then
                      echo "skip=true" >> "$GITHUB_OUTPUT"
                      exit 0
                  fi

                  TITLE=$(grep -m1 '^title:' "$NEW_FILE" | sed 's/^title: *//' | tr -d '"')
                  URL=$(grep -m1 '^url:' "$NEW_FILE" | sed 's/^url: *//' | tr -d '"')

                  echo "title=$TITLE" >> "$GITHUB_OUTPUT"
                  echo "url=$URL" >> "$GITHUB_OUTPUT"

            - name: Install Social Post Flow CLI
              if: steps.post.outputs.skip != 'true'
              run: npm install -g socialpostflow-cli

            - name: Post the announcement
              if: steps.post.outputs.skip != 'true'
              env:
                  SOCIALPOSTFLOW_API_TOKEN: ${{ secrets.SOCIALPOSTFLOW_API_TOKEN }}
              run: |
                  spf post \
                      -t link \
                      -c "New post: ${{ steps.post.outputs.title }}" \
                      -u "${{ steps.post.outputs.url }}" \
                      -i "${{ secrets.SOCIALPOSTFLOW_PROFILE_IDS }}"
